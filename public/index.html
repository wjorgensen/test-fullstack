<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Todo App</h1>
            <div id="user-info" class="user-info hidden">
                <span id="user-email"></span>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </header>

        <!-- Auth Section -->
        <div id="auth-section" class="auth-section">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <h2>Login to Your Account</h2>
                    <div class="form-group">
                        <label for="login-email">Email:</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password:</label>
                        <input type="password" id="login-password" required placeholder="Enter your password" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <div id="login-error" class="error-message"></div>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <h2>Create New Account</h2>
                    <div class="form-group">
                        <label for="register-email">Email:</label>
                        <input type="email" id="register-email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password:</label>
                        <input type="password" id="register-password" required placeholder="Min 6 characters" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                    <div id="register-error" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- Todo Section -->
        <div id="todo-section" class="todo-section hidden">
            <div class="todo-container">
                <!-- Add Todo Form -->
                <form id="add-todo-form" class="add-todo-form">
                    <input
                        type="text"
                        id="todo-input"
                        placeholder="What needs to be done?"
                        required
                        maxlength="255"
                    >
                    <button type="submit" class="btn btn-add">Add Todo</button>
                </form>

                <!-- Todo Stats -->
                <div class="todo-stats">
                    <span id="total-todos">Total: 0</span>
                    <span id="completed-todos">Completed: 0</span>
                    <span id="pending-todos">Pending: 0</span>
                </div>

                <!-- Todo List -->
                <div id="todo-list" class="todo-list">
                    <!-- Todos will be dynamically added here -->
                </div>

                <!-- Loading indicator -->
                <div id="loading" class="loading hidden">Loading...</div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <p>No todos yet. Add one above!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
